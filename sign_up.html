<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2#B325的资源小站的注册</title>
    <link rel="shortcut icon" href="./picture/favicon.ico">
    <link rel="bookmark" href="./picture/favicon.ico">
    <script src="./js/jquery.js"></script>
    <script src="./js/sign_up/sign_up.js"></script>
    <link rel="stylesheet" href="./css/sign_up/sign_up.css">
</head>
<body>
    <header>
        <h1>
            欢迎加入2#B325
        </h1>
    </header>
    <div class="box">
        <h2>
            注册
        </h2>
        <div class="input-box">
            <label>用户名</label>
            <input type="text">
        </div>
        <div class="input-box">
            <label>注册邮箱</label>
            <input type="email">
        </div>
        <div class="input-box">
            <label>输入密码</label>
            <input type="password">
        </div>
        <div class="input-box">
            <label>确认密码</label>
            <input type="password">
        </div>
        <div class="btn-box">
            <div>
                <button onclick="sign_up()">确定</button>
                <button onclick="window.location.href='../../index.html'">取消</button>
            </div>
        </div>
    </div>
    <footer>
        <h5>
            本网页由2#B325的舍长2编写，版权归其所有！
        </h5>
    </footer>
</body>
</html>
